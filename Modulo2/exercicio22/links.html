
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        a{
            color: darkred;
            text-decoration: none;
            
        }
        a:visited{
            color: darkred;
            font-weight: bolder;
        }

        a:hover{
            text-decoration: underline;
            color: black;

        }

        a:active{
            color: yellow;
        }

        a::after{
            content: " [Link]";
            color: aquamarine;
            text-decoration: none;
        }

        

        
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://gustavogusnabara.github.io">Repositorio do GitHub</a></li>
        <li><a href="https://youtube.com/cursoemvideo/">Canal do Youtube</a></li>
        <li><a href="https://cursoemvideo.com">Site do Curso em Video</a></li>
    </ul>
    
</body>
</html>
