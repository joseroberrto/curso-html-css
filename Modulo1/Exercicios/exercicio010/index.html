<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML 5</title>
</head>
<body>
    <h1>Imagens Dinamicas</h1>
    <p>Tente abrir esse site em varios dispositivos diferentes ou simplesmente tente aumentar e diminuir o amanho do seu navegador</p>

    <picture>
        <source media="(max-width:750px )" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width:1050px )" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagm flexivel">
    </picture>

    <h1>Reproduzindo Audios</h1>
    <p>Estou apredendendo a reproduzir midias em HTML 5 </p>
    <p>Usando a tag  &lt;audio&gt; simples</p>
    <audio src="midias/from-here.mp3" controls  ></audio>
    <br>
    <p>usando a tag &lt;audio&gt; com tag &lt;source&gt;</p>
    <audio preload="metadata" controls>
        <source src="midias/purple.mp3" type="audio/mpeg" >
    </audio>

    
</body>

</html>
